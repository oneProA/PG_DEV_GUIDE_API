server:
  port: 8080

spring:
  application:
    name: pg-dev-guide-api
  datasource:
    url: jdbc:h2:mem:pgdevguide;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

mybatis:
  mapper-locations: classpath*:mappers/**/*.xml
  type-aliases-package: com.pg.api
